<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拼豆图纸生成器</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #f5f5f2;
      color: #222;
    }

    header {
      padding: 28px 20px 18px;
      text-align: center;
      background: #ffffff;
      border-bottom: 1px solid #e6e0d8;
    }

    header h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: 1px;
    }

    header p {
      margin: 10px 0 0;
      color: #666;
      font-size: 14px;
    }

    main {
      width: min(1200px, 94vw);
      margin: 24px auto 40px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
    }

    .panel, .preview-panel {
      background: #ffffff;
      border: 1px solid #e5ded5;
      border-radius: 18px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.05);
    }

    .panel {
      padding: 20px;
      height: fit-content;
      position: sticky;
      top: 16px;
    }

    .preview-panel {
      padding: 20px;
      min-height: 620px;
    }

    .group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input[type="file"],
    input[type="number"],
    input[type="range"],
    select {
      width: 100%;
    }

    input[type="number"],
    select {
      border: 1px solid #d7d0c7;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }

    input[type="range"] {
      width: 100%;
      height: 24px;
      background: transparent;
      -webkit-appearance: none;
      appearance: none;
      --range-progress: 0%;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 10px;
      background: linear-gradient(to right, #FFE2EA 0%, #FFE2EA var(--range-progress), #ffffff var(--range-progress), #ffffff 100%);
      border: 1px solid #b8b8b8;
      border-radius: 999px;
    }

    input[type="range"]::-webkit-slider-thumb {
      width: 18px;
      height: 18px;
      margin-top: -5px;
      border-radius: 50%;
      background: #FFC7DB;
      border: 1px solid #8e8e8e;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]::-moz-range-track {
      height: 10px;
      background: #ffffff;
      border: 1px solid #b8b8b8;
      border-radius: 999px;
    }

    input[type="range"]::-moz-range-progress {
      height: 10px;
      background: #FFE2EA;
      border-radius: 999px;
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #FFC7DB;
      border: 1px solid #8e8e8e;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .hint {
      margin-top: 7px;
      color: #777;
      font-size: 12px;
      line-height: 1.5;
    }

    .value-line {
      display: flex;
      justify-content: space-between;
      color: #666;
      font-size: 12px;
      margin-top: 4px;
    }

    .range-value-right {
      color: #666;
      font-size: 12px;
      margin-top: 4px;
      text-align: right;
    }

    button {
      width: 100%;
      border: 1px solid #d7d0c7;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .primary {
      background: #ffffff;
      color: #222222;
      border-color: #FFE2EA;
    }

    .primary:hover {
      background: #fff7fa;
      transform: translateY(-1px);
    }

    .secondary {
      background: #ffffff;
      color: #222222;
      border-color: #FFE2EA;
      margin-top: 10px;
    }

    .secondary:hover {
      background: #fff7fa;
    }

    .danger {
      background: #f3dddd;
      color: #7b2323;
      margin-top: 10px;
    }

    .danger:hover {
      background: #edcccc;
    }

    .canvas-wrap {
      width: 100%;
      min-height: 480px;
      overflow: auto;
      border: 1px dashed #cfc7bc;
      border-radius: 14px;
      background:
        linear-gradient(45deg, #fafafa 25%, transparent 25%),
        linear-gradient(-45deg, #fafafa 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #fafafa 75%),
        linear-gradient(-45deg, transparent 75%, #fafafa 75%);
      background-size: 18px 18px;
      background-position: 0 0, 0 9px, 9px -9px, -9px 0px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    canvas {
      image-rendering: pixelated;
      background: #fff;
      max-width: none;
      border-radius: 8px;
    }

    .placeholder {
      color: #888;
      text-align: center;
      line-height: 1.8;
      padding: 40px 10px;
    }

    .info {
      margin: 14px 0 0;
      color: #555;
      font-size: 13px;
      line-height: 1.8;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .color-card {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 9px;
      align-items: center;
      border: 1px solid #ece5dc;
      border-radius: 10px;
      padding: 8px;
      font-size: 12px;
      background: #fffdf9;
    }

    .swatch {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, 0.18);
    }

    .card-text {
      line-height: 1.45;
      word-break: break-all;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 20px;
    }

    .small-btn {
      width: auto;
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 10px;
      background: #eee;
      color: #333;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
      color: #444;
      margin: 10px 0 0;
    }

    .toggle input {
      width: auto;
    }

    .mini-preview {
      width: 100%;
      max-height: 180px;
      object-fit: contain;
      margin-top: 10px;
      border: 1px solid #eee3d8;
      border-radius: 12px;
      background: #fafafa;
      display: none;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #f0eadf;
      color: #5c4c38;
      font-size: 12px;
      margin-left: 6px;
    }

    .warning {
      background: #fff8e8;
      border: 1px solid #f0dfb8;
      color: #6d5429;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.6;
      margin-top: 12px;
    }

    @media (max-width: 860px) {
      main {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
      }

      .preview-panel {
        min-height: 420px;
      }

      header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>拼豆图纸生成器</h1>
  </header>

  <main>
    <section class="panel">
      <div class="group">
        <label for="imageInput">上传图片</label>
        <input id="imageInput" type="file" accept="image/*" />
        <img id="miniPreview" class="mini-preview" alt="原图预览" />
        <div class="hint">建议使用头像、图标、像素风图片，效果会更清楚。</div>
      </div>

      <div class="group">
        <label for="colorSystem">拼豆种类</label>
        <select id="colorSystem">
          <option value="MARD">MARD</option>
          <option value="COCO">COCO</option>
          <option value="漫漫">漫漫</option>
          <option value="盼盼">盼盼</option>
          <option value="咪小窝">咪小窝</option>
        </select>
      </div>

      <div class="row">
        <div class="group">
          <label for="beadWidth">图纸宽度</label>
          <input id="beadWidth" type="number" min="8" max="160" value="40" />
          <div class="hint">单位：颗拼豆</div>
        </div>

        <div class="group">
          <label for="beadHeight">图纸高度</label>
          <input id="beadHeight" type="number" min="8" max="160" value="40" />
          <div class="hint">可手动改比例</div>
        </div>
      </div>

      <div class="group">
        <label for="colorCount">颜色数量</label>
        <input id="colorCount" type="range" min="2" max="221" value="32" />
        <div class="range-value-right"><span id="colorCountValue">32</span></div>
      </div>

      <div class="group">
        <label for="cellSize">显示大小</label>
        <input id="cellSize" type="range" min="8" max="34" value="16" />
        <div class="value-line">
          <span>小</span>
          <strong><span id="cellSizeValue">16</span> px/颗</strong>
          <span>大</span>
        </div>
      </div>

      <div class="group">
        <label for="mode">图纸样式</label>
        <select id="mode">
          <option value="square">方格像素图</option>
          <option value="symbol">标准色号图</option>
          <option value="circle">圆形拼豆 + 网格</option>
        </select>

        <label class="toggle">
          <input id="showGrid" type="checkbox" checked />
          显示网格
        </label>

        <label class="toggle">
          <input id="lockRatio" type="checkbox" checked />
          根据图片比例自动调整高度
        </label>
      </div>

      <button class="primary" id="generateBtn">生成图纸</button>
      <button class="secondary" id="downloadBtn">导出 PNG 图纸</button>
      <button class="danger" id="clearBtn">清空</button>
    </section>

    <section class="preview-panel">
      <div class="topbar">
        <h2>图纸预览</h2>
      </div>

      <div class="canvas-wrap" id="canvasWrap">
        <div class="placeholder" id="placeholder">
          还没有生成图纸。<br />
          上传图片后点击“生成图纸”。
        </div>
        <canvas id="patternCanvas" style="display:none;"></canvas>
      </div>

      <div class="info" id="resultInfo"></div>
      <div class="palette" id="palette"></div>
    </section>
  </main>

    function handleImageUpload(event) {

    function getActivePalette() {
      const system = colorSystemInput.value;
      const basePalette = STANDARD_PALETTE.map(color => {
        const displayCode = COLOR_CODE_MAP[color.code]?.[system] || color.code;
        return prepareColor({
          ...color,
          mardCode: color.code,
          displayCode,
          system
        });
      });

      const extraColors = EXTRA_COLOR_SYSTEM_COLORS[system] || [];
      return basePalette.concat(extraColors.map(color => {
        return prepareColor({ ...color, system });
      }));
    }

    function updateColorCountMax() {
      const activePalette = getActivePalette();
      colorCountInput.max = activePalette.length;
      if (parseInt(colorCountInput.value, 10) > activePalette.length) {
        colorCountInput.value = activePalette.length;
      }
      colorCountValue.textContent = colorCountInput.value;
      updateRangeFill(colorCountInput);
    }

    function generatePattern() {
      if (!sourceImage) {
        alert("请先上传一张图片。");
        return;
      }

      

      const activePalette = getActivePalette();
      const beadWidth = clamp(parseInt(beadWidthInput.value || 40), 8, 160);
      const beadHeight = clamp(parseInt(beadHeightInput.value || 40), 8, 160);
      const colorCount = clamp(parseInt(colorCountInput.value || 32), 2, activePalette.length);

      beadWidthInput.value = beadWidth;
      beadHeightInput.value = beadHeight;
      colorCountInput.value = colorCount;
      colorCountValue.textContent = colorCount;
      updateColorCountMax();

      const pixels = sampleCellsFromImage(sourceImage, beadWidth, beadHeight);

      const fullMatched = pixels.map(pixel => nearestColorIndex(pixel, activePalette));
      const fullCounts = new Array(activePalette.length).fill(0);
      fullMatched.forEach(index => fullCounts[index]++);

const selectedPaletteIndices = selectPaletteIndices(activePalette, fullCounts, colorCount);
const selectedPalette = selectedPaletteIndices.map(index => activePalette[index]);

      const indexedPixels = pixels.map(pixel => nearestColorIndex(pixel, selectedPalette));
      const counts = new Array(selectedPalette.length).fill(0);
      indexedPixels.forEach(index => counts[index]++);

      lastPattern = {
        width: beadWidth,
        height: beadHeight,
        palette: selectedPalette,
        counts,
        indexedPixels
      };

      drawPattern(lastPattern);
      renderPalette(lastPattern);
      placeholder.style.display = "none";
      canvas.style.display = "block";

      resultInfo.innerHTML =
        `尺寸：<strong>${beadWidth} × ${beadHeight}</strong> 颗，合计 <strong>${beadWidth * beadHeight}</strong> 颗拼豆。` +
        ` 当前使用 <strong>${selectedPalette.length}</strong> 种颜色，色卡总数 <strong>${activePalette.length}</strong> 色。`;
    }

function selectPaletteIndices(palette, counts, colorCount) {
  const used = counts
    .map((count, index) => ({ count, index, color: palette[index] }))
    .filter(item => item.count > 0)
    .sort((a, b) => b.count - a.count);

  if (used.length <= colorCount) {
    return used.map(item => item.index);
  }

  const chosen = [];
  const chosenSet = new Set();
  const total = counts.reduce((sum, count) => sum + count, 0);
  const minBucketCount = Math.max(4, Math.round(total * 0.004));

  function pushIndex(index) {
    if (!chosenSet.has(index)) {
      chosen.push(index);
      chosenSet.add(index);
    }
  }

  const blackCandidate = used.find(item => item.color.luma < 38 && item.color.saturation < 0.22);
  if (blackCandidate) pushIndex(blackCandidate.index);

  const whiteCandidate = used.find(item => item.color.luma > 235 && item.color.saturation < 0.10);
  if (whiteCandidate) pushIndex(whiteCandidate.index);

  const buckets = {};

  used.forEach(item => {
    const bucket = item.color.hueBucket;
    if (!bucket) return;
    if (!buckets[bucket]) buckets[bucket] = [];
    buckets[bucket].push(item);
  });

  Object.keys(buckets).forEach(bucketName => {
    const items = buckets[bucketName];
    const bucketTotal = items.reduce((sum, item) => sum + item.count, 0);
    if (bucketTotal < minBucketCount) return;

    const representative =
      items
        .filter(item => item.color.saturation > 0.24)
        .sort((a, b) => b.count - a.count)[0] || items[0];

    if (representative) pushIndex(representative.index);
  });

  while (chosen.length > colorCount) {
    chosen.sort((a, b) => counts[b] - counts[a]);
    chosen.pop();
    chosenSet.clear();
    chosen.forEach(index => chosenSet.add(index));
  }

  const remaining = used.filter(item => !chosenSet.has(item.index));

  while (chosen.length < colorCount && remaining.length) {
    let best = remaining[0];
    let bestScore = -Infinity;

    remaining.forEach(item => {
      const color = palette[item.index];
      let minDistance = Infinity;

      if (chosen.length) {
        chosen.forEach(chosenIndex => {
          const chosenColor = palette[chosenIndex];
          const dL = color.lab.l - chosenColor.lab.l;
          const dA = color.lab.a - chosenColor.lab.a;
          const dB = color.lab.b - chosenColor.lab.b;
          const hueGap = hueDistance(color.hue, chosenColor.hue);
          const distance = Math.sqrt(dL * dL + dA * dA + dB * dB) + hueGap * 0.55;
          if (distance < minDistance) minDistance = distance;
        });
      } else {
        minDistance = 100;
      }

      const diversityBonus = Math.min(90, minDistance);
      const vividBonus = color.saturation > 0.38 ? 18 : 0;
      const score = item.count * 5 + diversityBonus + vividBonus;

      if (score > bestScore) {
        bestScore = score;
        best = item;
      }
    });

    pushIndex(best.index);

    const removeIndex = remaining.findIndex(item => item.index === best.index);
    if (removeIndex >= 0) remaining.splice(removeIndex, 1);
  }

  return chosen.sort((a, b) => counts[b] - counts[a]);
}

function hueBucketName(hue, saturation) {
  if (saturation < 0.16) return null;

  if (hue < 15 || hue >= 345) return "red";
  if (hue < 40) return "orange";
  if (hue < 68) return "yellow";
  if (hue < 95) return "lime";
  if (hue < 165) return "green";
  if (hue < 195) return "cyan";
  if (hue < 250) return "blue";
  if (hue < 290) return "indigo";
  if (hue < 330) return "purple";

  return "magenta";
}
    
    function sampleCellsFromImage(image, beadWidth, beadHeight) {
      const sampleScale = 8;
      const workCanvas = document.createElement("canvas");
      workCanvas.width = beadWidth * sampleScale;
      workCanvas.height = beadHeight * sampleScale;
      const workCtx = workCanvas.getContext("2d", { willReadFrequently: true });

      workCtx.imageSmoothingEnabled = true;
      workCtx.imageSmoothingQuality = "high";
      workCtx.clearRect(0, 0, workCanvas.width, workCanvas.height);
      workCtx.drawImage(image, 0, 0, workCanvas.width, workCanvas.height);

      const data = workCtx.getImageData(0, 0, workCanvas.width, workCanvas.height).data;
      const cellColors = [];

      for (let y = 0; y < beadHeight; y++) {
        for (let x = 0; x < beadWidth; x++) {
          const samples = [];

          for (let sy = 0; sy < sampleScale; sy++) {
            for (let sx = 0; sx < sampleScale; sx++) {
              const px = x * sampleScale + sx;
              const py = y * sampleScale + sy;
              const offset = (py * workCanvas.width + px) * 4;
              const a = data[offset + 3];

              if (a < 20) {
                samples.push({ r: 255, g: 255, b: 255 });
              } else {
                samples.push({
                  r: data[offset],
                  g: data[offset + 1],
                  b: data[offset + 2]
                });
              }
            }
          }

          cellColors.push(chooseCellRepresentativeColor(samples));
        }
      }

      return cellColors;
    }

    function chooseCellRepresentativeColor(samples) {
      const total = samples.length;
      if (!total) return { r: 255, g: 255, b: 255 };

      let rSum = 0;
      let gSum = 0;
      let bSum = 0;
      let minLuma = Infinity;
      let maxLuma = -Infinity;
      let darkest = samples[0];
      let brightest = samples[0];
      let saturated = samples[0];
      let maxSaturation = -Infinity;

      for (const sample of samples) {
        rSum += sample.r;
        gSum += sample.g;
        bSum += sample.b;

        const luma = rgbLuma(sample.r, sample.g, sample.b);
        const hsl = rgbToHsl(sample.r, sample.g, sample.b);

        if (luma < minLuma) {
          minLuma = luma;
          darkest = sample;
        }

        if (luma > maxLuma) {
          maxLuma = luma;
          brightest = sample;
        }

        if (hsl.s > maxSaturation) {
          maxSaturation = hsl.s;
          saturated = sample;
        }
      }

      const average = {
        r: Math.round(rSum / total),
        g: Math.round(gSum / total),
        b: Math.round(bSum / total)
      };

      const contrast = maxLuma - minLuma;
      if (contrast < 28) {
        return average;
      }

      const clusters = runLocalColorClusters(samples, [darkest, brightest, saturated, average]);
      const usableClusters = clusters
        .filter(cluster => cluster.count > 0)
        .sort((a, b) => b.count - a.count);

      if (!usableClusters.length) return average;

      const dominant = usableClusters[0];
      const dominantCoverage = dominant.count / total;

      const darkClusters = usableClusters
        .filter(cluster => cluster.luma < 88 && cluster.count / total >= 0.16)
        .sort((a, b) => {
          const coverageDiff = (b.count / total) - (a.count / total);
          if (Math.abs(coverageDiff) > 0.12) return coverageDiff;
          return a.luma - b.luma;
        });

      if (darkClusters.length) {
        const dark = darkClusters[0];
        const darkCoverage = dark.count / total;
        const dominantIsMuchLighter = dominant.luma - dark.luma > 58;

        if (dark.minLuma < 38 && contrast > 68 && darkCoverage >= 0.22) {
          return { r: 0, g: 0, b: 0 };
        }

        if (dominantIsMuchLighter && darkCoverage >= 0.34) {
          return dark.color;
        }
      }

      const vividClusters = usableClusters
        .filter(cluster => {
          const hsl = rgbToHsl(cluster.color.r, cluster.color.g, cluster.color.b);
          return hsl.s > 0.42 && cluster.count / total >= 0.24;
        })
        .sort((a, b) => b.count - a.count);

      if (dominantCoverage < 0.52 && vividClusters.length) {
        const vivid = vividClusters[0];
        const vividHsl = rgbToHsl(vivid.color.r, vivid.color.g, vivid.color.b);
        const dominantHsl = rgbToHsl(dominant.color.r, dominant.color.g, dominant.color.b);
        const hueGap = hueDistance(vividHsl.h, dominantHsl.h);

        if (hueGap > 18 || Math.abs(vivid.luma - dominant.luma) > 45) {
          return vivid.color;
        }
      }

      return dominant.color;
    }

    function runLocalColorClusters(samples, initialColors) {
      let centers = [];

      for (const color of initialColors) {
        if (!centers.some(center => colorDistanceLite(center, color) < 14)) {
          centers.push({ r: color.r, g: color.g, b: color.b });
        }
      }

      while (centers.length < 2) centers.push({ ...samples[0] });
      centers = centers.slice(0, 4);

      let assignments = new Array(samples.length).fill(0);

      for (let iteration = 0; iteration < 5; iteration++) {
        const sums = centers.map(() => ({ r: 0, g: 0, b: 0, count: 0, minLuma: Infinity }));

        samples.forEach((sample, sampleIndex) => {
          let bestCenter = 0;
          let bestDistance = Infinity;

          centers.forEach((center, centerIndex) => {
            const distance = colorDistanceLite(sample, center);
            if (distance < bestDistance) {
              bestDistance = distance;
              bestCenter = centerIndex;
            }
          });

          assignments[sampleIndex] = bestCenter;
          sums[bestCenter].r += sample.r;
          sums[bestCenter].g += sample.g;
          sums[bestCenter].b += sample.b;
          sums[bestCenter].count++;
          sums[bestCenter].minLuma = Math.min(sums[bestCenter].minLuma, rgbLuma(sample.r, sample.g, sample.b));
        });

        centers = centers.map((center, index) => {
          const sum = sums[index];
          if (!sum.count) return center;
          return {
            r: Math.round(sum.r / sum.count),
            g: Math.round(sum.g / sum.count),
            b: Math.round(sum.b / sum.count)
          };
        });
      }

      const clusters = centers.map(() => ({
        rSum: 0,
        gSum: 0,
        bSum: 0,
        count: 0,
        minLuma: Infinity
      }));

      samples.forEach((sample, sampleIndex) => {
        const cluster = clusters[assignments[sampleIndex]];
        cluster.rSum += sample.r;
        cluster.gSum += sample.g;
        cluster.bSum += sample.b;
        cluster.count++;
        cluster.minLuma = Math.min(cluster.minLuma, rgbLuma(sample.r, sample.g, sample.b));
      });

      return clusters.map(cluster => {
        const color = cluster.count
          ? {
              r: Math.round(cluster.rSum / cluster.count),
              g: Math.round(cluster.gSum / cluster.count),
              b: Math.round(cluster.bSum / cluster.count)
            }
          : { r: 255, g: 255, b: 255 };

        return {
          color,
          count: cluster.count,
          luma: rgbLuma(color.r, color.g, color.b),
          minLuma: cluster.minLuma
        };
      });
    }

    function colorDistanceLite(a, b) {
      const dl = rgbLuma(a.r, a.g, a.b) - rgbLuma(b.r, b.g, b.b);
      const dr = a.r - b.r;
      const dg = a.g - b.g;
      const db = a.b - b.b;
      return Math.sqrt(dr * dr * 0.26 + dg * dg * 0.48 + db * db * 0.26 + dl * dl * 0.70);
    }

    function nearestColorIndex(pixel, palette) {
      let bestIndex = 0;
      let bestDistance = Infinity;

      const pixelLab = rgbToLab(pixel.r, pixel.g, pixel.b);
      const pixelHsl = rgbToHsl(pixel.r, pixel.g, pixel.b);
      const pixelLuma = rgbLuma(pixel.r, pixel.g, pixel.b);
      const pixelChroma = Math.sqrt(pixelLab.a * pixelLab.a + pixelLab.b * pixelLab.b);
      const isVividPixel = pixelHsl.s > 0.35 && pixelChroma > 22;
      const isNeutralPixel = pixelHsl.s < 0.12 || pixelChroma < 7;
      const pixelHueBucket = hueBucketName(pixelHsl.h, pixelHsl.s);
      palette.forEach((color, index) => {
        const dL = pixelLab.l - color.lab.l;
        const dA = pixelLab.a - color.lab.a;
        const dB = pixelLab.b - color.lab.b;
        const dS = (pixelHsl.s - color.saturation) * 100;
        const dLight = (pixelHsl.l - color.lightness) * 100;
        const dHue = hueDistance(pixelHsl.h, color.hue);
        const dLuma = pixelLuma - color.luma;

        let distance =
          dL * dL * 1.15 +
          dA * dA +
          dB * dB +
          dLight * dLight * 0.45;

        if (isVividPixel) {
distance += dS * dS * 1.85;

if (color.saturation > 0.14) {
  distance += dHue * dHue * 0.72;

  if (dHue > 18) {
    distance += Math.pow(dHue - 18, 2) * 1.65;
  }

  if (pixelHueBucket && color.hueBucket && pixelHueBucket !== color.hueBucket && dHue > 20) {
    distance += 1800 + Math.pow(dHue - 20, 2) * 0.75;
  }
} else {
  distance += 3200;
}
if (
  pixelHueBucket === "blue" &&
  color.hueBucket &&
  color.hueBucket !== "blue" &&
  color.hueBucket !== "indigo" &&
  dHue > 16
) {
  distance += 2600;
}

if (
  pixelHueBucket === "green" &&
  color.hueBucket &&
  !["green", "lime", "cyan"].includes(color.hueBucket) &&
  dHue > 18
) {
  distance += 1800;
}
        }
        
          const darkenAmount = dLuma - 18;
          if (darkenAmount > 0) {
            distance += darkenAmount * darkenAmount * 1.65;
          }

          const desaturateAmount = (pixelHsl.s - color.saturation) * 100 - 10;
          if (desaturateAmount > 0) {
            distance += desaturateAmount * desaturateAmount * 1.25;
          }
        } else if (isNeutralPixel) {
          distance += dS * dS * 0.30;
          distance += Math.pow(color.saturation * 100, 2) * 1.20;
        } else {
          distance += dS * dS * 0.75;
          if (color.saturation > 0.12) {
            distance += dHue * dHue * 0.10;
          }
        }

        if (pixelLuma > 80 && color.luma < pixelLuma - 30) {
          const amount = pixelLuma - color.luma - 30;
          distance += amount * amount * 1.10;
        }

        if (pixelLuma < 55 && color.luma > pixelLuma + 45) {
          const amount = color.luma - pixelLuma - 45;
          distance += amount * amount * 1.30;
        }

        if (distance < bestDistance) {
          bestDistance = distance;
          bestIndex = index;
        }
      });

      return bestIndex;
    }

  function prepareColor(color) {
  const lab = rgbToLab(color.r, color.g, color.b);
  const hsl = rgbToHsl(color.r, color.g, color.b);

  return {
    ...color,
    lab,
    hue: hsl.h,
    saturation: hsl.s,
    lightness: hsl.l,
    luma: rgbLuma(color.r, color.g, color.b),
    hueBucket: hueBucketName(hsl.h, hsl.s)
  };
}

    function rgbLuma(r, g, b) {
      return r * 0.299 + g * 0.587 + b * 0.114;
    }

    function rgbToLab(r, g, b) {
      let sr = r / 255;
      let sg = g / 255;
      let sb = b / 255;

      sr = sr <= 0.04045 ? sr / 12.92 : Math.pow((sr + 0.055) / 1.055, 2.4);
      sg = sg <= 0.04045 ? sg / 12.92 : Math.pow((sg + 0.055) / 1.055, 2.4);
      sb = sb <= 0.04045 ? sb / 12.92 : Math.pow((sb + 0.055) / 1.055, 2.4);

      let x = sr * 0.4124564 + sg * 0.3575761 + sb * 0.1804375;
      let y = sr * 0.2126729 + sg * 0.7151522 + sb * 0.0721750;
      let z = sr * 0.0193339 + sg * 0.1191920 + sb * 0.9503041;

      x /= 0.95047;
      z /= 1.08883;

      const fx = labPivot(x);
      const fy = labPivot(y);
      const fz = labPivot(z);

      return {
        l: 116 * fy - 16,
        a: 500 * (fx - fy),
        b: 200 * (fy - fz)
      };
    }

    function labPivot(value) {
      return value > 0.008856 ? Math.cbrt(value) : 7.787 * value + 16 / 116;
    }

    function rgbToHsl(r, g, b) {
      r /= 255;
      g /= 255;
      b /= 255;

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const lightness = (max + min) / 2;
      let hue = 0;
      let saturation = 0;

      if (max !== min) {
        const delta = max - min;
        saturation = lightness > 0.5 ? delta / (2 - max - min) : delta / (max + min);

        if (max === r) {
          hue = ((g - b) / delta + (g < b ? 6 : 0)) * 60;
        } else if (max === g) {
          hue = ((b - r) / delta + 2) * 60;
        } else {
          hue = ((r - g) / delta + 4) * 60;
        }
      }

      return { h: hue, s: saturation, l: lightness };
    }

    function hueDistance(hueA, hueB) {
      const diff = Math.abs(hueA - hueB) % 360;
      return Math.min(diff, 360 - diff);
    }

    function drawPattern(pattern) {
      const cellSize = clamp(parseInt(cellSizeInput.value || 16), 8, 34);
      const mode = modeSelect.value;
      const showGrid = showGridInput.checked;

      canvas.width = pattern.width * cellSize;
      canvas.height = pattern.height * cellSize;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      for (let y = 0; y < pattern.height; y++) {
        for (let x = 0; x < pattern.width; x++) {
          const pixelIndex = y * pattern.width + x;
          const colorIndex = pattern.indexedPixels[pixelIndex];
          const color = pattern.palette[colorIndex];
          const left = x * cellSize;
          const top = y * cellSize;

          ctx.fillStyle = color.hex;

          if (mode === "circle") {
            ctx.beginPath();
            ctx.arc(
              left + cellSize / 2,
              top + cellSize / 2,
              cellSize * 0.38,
              0,
              Math.PI * 2
            );
            ctx.fill();
          } else {
            ctx.fillRect(left, top, cellSize, cellSize);
          }

          if (mode === "symbol") {
            const label = getColorLabel(color);
            const brightness = (color.r * 299 + color.g * 587 + color.b * 114) / 1000;
            ctx.fillStyle = brightness < 135 ? "#ffffff" : "#111111";
            ctx.font = `${Math.max(6, Math.floor(cellSize * 0.34))}px Arial`;
            ctx.fillText(label, left + cellSize / 2, top + cellSize / 2);
          }
        }
      }

      if (showGrid) {
        drawGrid(pattern.width, pattern.height, cellSize);
      }
    }

    function drawGrid(width, height, cellSize) {
      ctx.save();
      ctx.lineWidth = 1;

      for (let x = 0; x <= width; x++) {
        ctx.beginPath();
        ctx.strokeStyle = x % 5 === 0 ? "rgba(0,0,0,0.38)" : "rgba(0,0,0,0.14)";
        ctx.moveTo(x * cellSize + 0.5, 0);
        ctx.lineTo(x * cellSize + 0.5, height * cellSize);
        ctx.stroke();
      }

      for (let y = 0; y <= height; y++) {
        ctx.beginPath();
        ctx.strokeStyle = y % 5 === 0 ? "rgba(0,0,0,0.38)" : "rgba(0,0,0,0.14)";
        ctx.moveTo(0, y * cellSize + 0.5);
        ctx.lineTo(width * cellSize, y * cellSize + 0.5);
        ctx.stroke();
      }

      ctx.restore();
    }

    function renderPalette(pattern) {
      paletteBox.innerHTML = "";

      pattern.palette
        .map((color, index) => ({ color, count: pattern.counts[index] }))
        .sort((a, b) => b.count - a.count)
        .forEach(item => {
          const card = document.createElement("div");
          card.className = "color-card";

          const swatch = document.createElement("div");
          swatch.className = "swatch";
          swatch.style.background = item.color.hex;

          const text = document.createElement("div");
          text.className = "card-text";
          text.innerHTML = `
            <strong>${getColorLabel(item.color)}</strong><br>
            ${item.color.hex}<br>
            ${item.count} 颗
          `;

          card.appendChild(swatch);
          card.appendChild(text);
          paletteBox.appendChild(card);
        });
    }

    function getColorLabel(color) {
      return color.displayCode || color.code;
    }

    function downloadPattern() {
      if (!lastPattern) {
        alert("请先生成图纸。");
        return;
      }

      const system = colorSystemInput.value || "MARD";
      const link = document.createElement("a");
      link.download = `${system}拼豆图纸.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function clearAll() {
      imageInput.value = "";
      sourceImage = null;
      lastPattern = null;
      miniPreview.removeAttribute("src");
      miniPreview.style.display = "none";
      canvas.style.display = "none";
      placeholder.style.display = "block";
      resultInfo.innerHTML = "";
      paletteBox.innerHTML = "";
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function updateAllRangeFills() {
      document.querySelectorAll('input[type="range"]').forEach(updateRangeFill);
    }

    function updateRangeFill(input) {
      const min = parseFloat(input.min || 0);
      const max = parseFloat(input.max || 100);
      const value = parseFloat(input.value || 0);
      const percent = max === min ? 0 : ((value - min) / (max - min)) * 100;
      input.style.setProperty("--range-progress", `${Math.max(0, Math.min(100, percent))}%`);
    }

    function clamp(value, min, max) {
      if (Number.isNaN(value)) return min;
      return Math.min(max, Math.max(min, value));
    }
